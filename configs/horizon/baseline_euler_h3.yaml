# Horizon ablation — h=3h (Liquid-ODE, Euler).
#
# Longer horizon than the canonical h=1; persistence collapses faster as h
# grows, so this row carries most of the discriminating power for the paper
# (R3 reviewer Finding 2: 1h is dominated by persistence).
#
# Window inventory (stride=1, window_size=24, horizon_tol_hours=0.0835):
#   train=472  val=76  test=71
#
# Tolerance: 0.0835 h ≈ median_dt / 2 (median dt = 0.1667 h). The dataset has
# a single ~1.17 h gap; this tolerance accepts any window whose realized
# horizon is within half a sampling step of the requested h.

data:
  csv_path: data/raw/qZETA_data_copy.csv
  feature_cols: [OD, PRE, TEMP_EXT, TEMP_CULTURE, PAR_LIGHT, PH, DO]
  target_col: OD
  od_min: 0.0
  od_max: null  # train-only OD (R3 leak fix)


  od_phys_max: 3.8

windows:
  window_size: 24
  stride: 1
  horizon_hours: 3.0
  horizon_tol_hours: 0.0835

split:
  train_ratio: 0.70
  val_ratio: 0.15

model:
  hidden_size: 32
  tau_min: 0.1
  forecast_steps: 4
  delta_scale: 0.1
  ode_method: euler

training:
  epochs: 300
  batch_size: 64
  lr: 0.0022379431100255152
  weight_decay: 0.0000024028981322551868
  eval_every: 10
  patience: 10
  grad_clip_norm: 1.0

physics:
  lambda_logistic: 0.0
  lambda_smooth: 0.0

seeds: [0, 1, 2, 3, 4]
