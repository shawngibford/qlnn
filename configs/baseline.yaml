# Canonical classical baseline for the QLNN paper.
#
# Numbers in this file are the locked evaluation protocol — every model in the
# paper (classical baseline, quantum encoder, full QLNN, QWGAN) must run under
# the same data settings to be comparable.
#
# Model hyperparameters are seeded from the HPO best config in
#   results/hpo_od_forecast_1h_full_2026-01-23/best_config.json
# with one upgrade: ode_method=dopri5 (adaptive Dormand-Prince) instead of
# manual Euler. forecast_steps still controls fixed-step methods if you swap.

data:
  csv_path: data/raw/qZETA_data_copy.csv
  feature_cols: [OD, PRE, TEMP_EXT, TEMP_CULTURE, PAR_LIGHT, PH, DO]
  target_col: OD
  od_min: 0.0
  od_max: 3.8

windows:
  window_size: 24
  stride: 1
  horizon_hours: 1.0
  horizon_tol_hours: 0.001

split:
  train_ratio: 0.70
  val_ratio: 0.15

model:
  hidden_size: 32
  tau_min: 0.1
  forecast_steps: 4
  delta_scale: 0.1
  ode_method: dopri5
  rtol: 0.001
  atol: 0.0001

training:
  epochs: 300
  batch_size: 64
  lr: 0.0022379431100255152
  weight_decay: 0.0000024028981322551868
  eval_every: 10
  patience: 10
  grad_clip_norm: 1.0

physics:
  lambda_logistic: 0.0
  lambda_smooth: 0.0
  mu_norm: 0.4
  K_norm: 1.0

seeds: [0, 1, 2, 3, 4]
