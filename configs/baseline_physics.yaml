# Physics-informed ablation — same as baseline.yaml but with the logistic-growth
# regularizer turned on. Used in the paper's ablation table to show whether the
# logistic-growth prior helps, hurts, or is neutral relative to the pure
# data-driven baseline.
#
# Reviewer R1 (BLOCKER B2) showed that the previous `lambda_smooth` term
# reduced algebraically to a re-weighted MSE (because
# ``((yp - od_last) - (yb - od_last))^2 == (yp - yb)^2``) rather than a real
# smoothness penalty. It has been removed from PhysicsLossConfig and from this
# config. Real smoothness regularization requires multi-step output, which is
# planned for the trajectory-forecast variant.

data:
  csv_path: data/raw/qZETA_data_copy.csv
  feature_cols: [OD, PRE, TEMP_EXT, TEMP_CULTURE, PAR_LIGHT, PH, DO]
  target_col: OD
  # Train-only OD scaler (R3 finding 6). Set `od_max` to a number to revert.
  od_min: 0.0
  od_max: null
  od_phys_max: 3.8

windows:
  window_size: 24
  stride: 1
  horizon_hours: 1.0
  horizon_tol_hours: 0.001

split:
  train_ratio: 0.70
  val_ratio: 0.15

model:
  hidden_size: 32
  tau_min: 0.1
  forecast_steps: 4
  delta_scale: 0.1
  ode_method: dopri5
  rtol: 0.001
  atol: 0.0001

training:
  epochs: 300
  batch_size: 64
  lr: 0.0022379431100255152
  weight_decay: 0.0000024028981322551868
  eval_every: 10
  patience: 10
  grad_clip_norm: 1.0

physics:
  lambda_logistic: 0.1
  mu_norm: 0.4
  K_norm: 1.0

seeds: [0, 1, 2, 3, 4]
