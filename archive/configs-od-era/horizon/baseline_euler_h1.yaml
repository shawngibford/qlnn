# Horizon ablation — h=1h (Liquid-ODE, Euler).
#
# Identical to configs/baseline_euler_fast.yaml; included in the horizon/ set
# so the run_horizon_sweep.sh driver is symmetric across horizons.
#
# Window inventory (computed at sweep build time, stride=1, window_size=24):
#   train=500  val=88  test=86
#
# dt note: the qZETA grid is regular (776/777 dt values = 0.1667 h). One ~1.17 h
# gap is the only irregularity. For h=1 the tight horizon_tol_hours=0.001 used
# in the headline baseline is fine — no windows are dropped relative to a
# loose tolerance.

data:
  csv_path: data/raw/qZETA_data_copy.csv
  feature_cols: [OD, PRE, TEMP_EXT, TEMP_CULTURE, PAR_LIGHT, PH, DO]
  target_col: OD
  od_min: 0.0
  od_max: null  # train-only OD (R3 leak fix)


  od_phys_max: 3.8

windows:
  window_size: 24
  stride: 1
  horizon_hours: 1.0
  horizon_tol_hours: 0.001

split:
  train_ratio: 0.70
  val_ratio: 0.15

model:
  hidden_size: 32
  tau_min: 0.1
  forecast_steps: 4
  delta_scale: 0.1
  ode_method: euler

training:
  epochs: 300
  batch_size: 64
  lr: 0.0022379431100255152
  weight_decay: 0.0000024028981322551868
  eval_every: 10
  patience: 10
  grad_clip_norm: 1.0

physics:
  lambda_logistic: 0.0
  lambda_smooth: 0.0

seeds: [0, 1, 2, 3, 4]
